name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-miyoo-uclibc:
    name: Build (Miyoo/uclibc)
    runs-on: ubuntu-latest
    container:
      image: miyoocfw/toolchain-shared-uclibc:latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install cmake
        run: apt-get update && apt-get install -y --no-install-recommends cmake

      - name: Configure
        run: cmake -B build_miyoo -DPLATFORM=miyoo -DCMAKE_TOOLCHAIN_FILE=cmake/miyoo.cmake -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build_miyoo -j$(nproc)

      - name: Create IPK package
        run: cmake --build build_miyoo --target ipk

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: butterscotch-miyoo-uclibc
          path: build_miyoo/butterscotch

      - name: Upload IPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: butterscotch-uclibc-ipk
          path: build_miyoo/butterscotch.ipk

  build-miyoo-musl:
    name: Build (Miyoo/musl)
    runs-on: ubuntu-latest
    container:
      image: miyoocfw/toolchain-shared-musl:latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install cmake
        run: apt-get update && apt-get install -y --no-install-recommends cmake

      - name: Configure
        run: cmake -B build_miyoo -DPLATFORM=miyoo -DCMAKE_TOOLCHAIN_FILE=cmake/miyoo.cmake -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build_miyoo -j$(nproc)

      - name: Create IPK package
        run: cmake --build build_miyoo --target ipk

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: butterscotch-miyoo-musl
          path: build_miyoo/butterscotch

      - name: Upload IPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: butterscotch-musl-ipk
          path: build_miyoo/butterscotch.ipk
